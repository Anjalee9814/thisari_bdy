<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Thisari! 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:ital,wght@0,400;1,400&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #f0c040;
    --rose: #e8698a;
    --deep: #1a0a2e;
    --violet: #6b2fa0;
    --lavender: #c084f5;
    --cream: #fff8f0;
    --candle1: #ff9f43;
    --candle2: #ffd32a;
    --flame-inner: #fff176;
  }

  body {
    min-height: 100vh;
    background: var(--deep);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    position: relative;
  }

  /* Starfield */
  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute;
    width: 2px; height: 2px;
    background: white;
    border-radius: 50%;
    animation: twinkle var(--d, 3s) ease-in-out infinite;
    opacity: 0;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0; transform: scale(0.5); }
    50% { opacity: 1; transform: scale(1.2); }
  }

  /* Floating petals */
  .petal {
    position: fixed;
    width: 10px; height: 14px;
    border-radius: 50% 0 50% 0;
    opacity: 0.6;
    animation: fall linear infinite;
    pointer-events: none;
    z-index: 1;
  }
  @keyframes fall {
    0% { transform: translateY(-30px) rotate(0deg) translateX(0); opacity: 0.8; }
    100% { transform: translateY(110vh) rotate(720deg) translateX(60px); opacity: 0; }
  }

  /* Card */
  .card-wrap {
    position: relative;
    z-index: 10;
    perspective: 1200px;
  }
  .card {
    width: 440px;
    background: linear-gradient(160deg, #2d1060 0%, #1a0a2e 40%, #2a0845 100%);
    border-radius: 28px;
    border: 1.5px solid rgba(192,132,245,0.3);
    box-shadow:
      0 0 60px rgba(107,47,160,0.4),
      0 0 120px rgba(107,47,160,0.15),
      inset 0 1px 0 rgba(255,255,255,0.1);
    overflow: hidden;
    animation: cardIn 1.2s cubic-bezier(0.22,1,0.36,1) both;
    transform-style: preserve-3d;
    transition: transform 0.4s ease;
  }
  .card:hover { transform: rotateY(-4deg) rotateX(2deg) scale(1.01); }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(60px) rotateX(12deg) scale(0.9); }
    to   { opacity: 1; transform: translateY(0) rotateX(0) scale(1); }
  }

  /* Decorative top band */
  .top-band {
    height: 6px;
    background: linear-gradient(90deg, var(--rose), var(--gold), var(--lavender), var(--rose));
    background-size: 300% 100%;
    animation: shimmer 4s linear infinite;
  }
  @keyframes shimmer { to { background-position: -300% 0; } }

  .card-inner { padding: 32px 36px 36px; }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 24px;
    animation: fadeUp 0.8s 0.4s both;
  }
  .wishing { font-size: 13px; letter-spacing: 4px; color: var(--lavender); text-transform: uppercase; margin-bottom: 6px; }
  .name {
    font-family: 'Dancing Script', cursive;
    font-size: 58px;
    line-height: 1.1;
    background: linear-gradient(135deg, var(--gold), var(--rose), var(--lavender));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 20px rgba(240,192,64,0.4));
  }
  .happy {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 15px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    margin-top: 2px;
  }

  /* CAKE */
  .cake-scene {
    display: flex;
    justify-content: center;
    margin: 20px 0 28px;
    animation: fadeUp 0.8s 0.6s both;
  }
  .cake-wrap { position: relative; display: inline-block; }

  svg.cake { display: block; }

  /* Candle flames animation */
  .flame { animation: flicker 0.15s ease-in-out infinite alternate; transform-origin: bottom center; }
  .flame:nth-child(2) { animation-delay: 0.07s; }
  .flame:nth-child(3) { animation-delay: 0.13s; }
  .flame:nth-child(4) { animation-delay: 0.04s; }
  .flame:nth-child(5) { animation-delay: 0.1s; }
  @keyframes flicker {
    from { transform: scaleX(1) scaleY(1) translateY(0); opacity: 1; }
    to   { transform: scaleX(0.85) scaleY(0.92) translateY(1px); opacity: 0.88; }
  }

  /* Glow pulse */
  .glow-circle { animation: glowPulse 2s ease-in-out infinite; }
  @keyframes glowPulse {
    0%,100% { opacity: 0.3; r: 28; }
    50% { opacity: 0.55; r: 34; }
  }

  /* Sparkle particles from candles */
  .spark {
    position: absolute;
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--gold);
    pointer-events: none;
    animation: sparkFly var(--sd, 1.2s) ease-out infinite;
    opacity: 0;
  }
  @keyframes sparkFly {
    0% { transform: translate(0,0) scale(1); opacity: 1; }
    100% { transform: translate(var(--sx,10px), var(--sy,-40px)) scale(0); opacity: 0; }
  }

  /* Message */
  .message {
    text-align: center;
    animation: fadeUp 0.8s 0.9s both;
  }
  .message p {
    font-size: 16px;
    line-height: 1.85;
    color: rgba(255,255,255,0.75);
    font-weight: 300;
    letter-spacing: 0.4px;
  }
  .message .highlight {
    color: var(--lavender);
    font-style: italic;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 22px 0;
    animation: fadeUp 0.8s 0.75s both;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(90deg, transparent, rgba(192,132,245,0.4), transparent); }
  .divider-icon { color: var(--rose); font-size: 16px; }

  /* Bottom */
  .footer {
    margin-top: 28px;
    text-align: center;
    animation: fadeUp 0.8s 1.1s both;
  }
  .from { font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px; }
  .hearts { font-size: 20px; letter-spacing: 6px; animation: heartbeat 1.4s ease-in-out infinite; }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    15% { transform: scale(1.18); }
    30% { transform: scale(1); }
    45% { transform: scale(1.1); }
  }

  /* Blow button */
  .blow-btn {
    display: block;
    margin: 20px auto 0;
    padding: 10px 28px;
    border: 1.5px solid rgba(192,132,245,0.5);
    background: rgba(107,47,160,0.2);
    color: var(--lavender);
    border-radius: 50px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.3s ease;
    text-transform: uppercase;
  }
  .blow-btn:hover { background: rgba(107,47,160,0.5); box-shadow: 0 0 20px rgba(192,132,245,0.3); transform: scale(1.04); }
  .blow-btn.blown { color: var(--gold); border-color: rgba(240,192,64,0.5); }

  /* Confetti burst */
  .confetti-piece {
    position: fixed;
    width: 8px; height: 8px;
    pointer-events: none;
    z-index: 100;
    opacity: 0;
    animation: confettiFall 3s ease-in forwards;
    border-radius: 2px;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotateZ(0); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(100vh) rotateZ(720deg); opacity: 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Ribbon corners */
  .corner {
    position: absolute;
    font-size: 18px;
    opacity: 0.5;
    animation: spin 8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<!-- Petals -->
<div id="petals"></div>

<div class="card-wrap">
  <div class="card" id="card">
    <div class="top-band"></div>
    <div class="card-inner">

      <div class="header">
        <div class="wishing">✦ Wishing You A Beautiful ✦</div>
        <div class="name">Thisari</div>
        <div class="happy">Happy Birthday</div>
      </div>

      <!-- CAKE SVG -->
      <div class="cake-scene">
        <div class="cake-wrap" id="cakeWrap">
          <svg class="cake" width="260" height="200" viewBox="0 0 260 200" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <radialGradient id="glowGrad" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#ffd32a" stop-opacity="0.8"/>
                <stop offset="100%" stop-color="#ff9f43" stop-opacity="0"/>
              </radialGradient>
              <linearGradient id="tier1" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#c084f5"/>
                <stop offset="100%" stop-color="#7e22ce"/>
              </linearGradient>
              <linearGradient id="tier2" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#e879f9"/>
                <stop offset="100%" stop-color="#9333ea"/>
              </linearGradient>
              <linearGradient id="tier3" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#f0abfc"/>
                <stop offset="100%" stop-color="#a855f7"/>
              </linearGradient>
              <linearGradient id="plateGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#e2d5f8"/>
                <stop offset="100%" stop-color="#c4b5fd"/>
              </linearGradient>
              <filter id="glow">
                <feGaussianBlur stdDeviation="3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>

            <!-- Ambient glow from flames -->
            <circle class="glow-circle" cx="130" cy="80" r="28" fill="url(#glowGrad)" id="glowCircle"/>

            <!-- Plate -->
            <ellipse cx="130" cy="186" rx="88" ry="10" fill="url(#plateGrad)" opacity="0.5"/>

            <!-- Tier 3 (bottom) -->
            <rect x="50" y="145" width="160" height="40" rx="6" fill="url(#tier3)"/>
            <ellipse cx="130" cy="145" rx="80" ry="9" fill="#f5d0fe"/>
            <ellipse cx="130" cy="185" rx="80" ry="9" fill="#a855f7" opacity="0.5"/>
            <!-- Dots deco -->
            <circle cx="75" cy="166" r="4" fill="white" opacity="0.5"/>
            <circle cx="100" cy="158" r="3" fill="#fde68a" opacity="0.7"/>
            <circle cx="130" cy="163" r="4" fill="white" opacity="0.4"/>
            <circle cx="160" cy="156" r="3" fill="#fde68a" opacity="0.7"/>
            <circle cx="185" cy="166" r="4" fill="white" opacity="0.5"/>

            <!-- Tier 2 -->
            <rect x="70" y="108" width="120" height="40" rx="5" fill="url(#tier2)"/>
            <ellipse cx="130" cy="108" rx="60" ry="7" fill="#f0abfc"/>
            <ellipse cx="130" cy="148" rx="60" ry="7" fill="#9333ea" opacity="0.5"/>
            <!-- Dots deco -->
            <circle cx="90" cy="128" r="3.5" fill="white" opacity="0.5"/>
            <circle cx="115" cy="122" r="2.5" fill="#fde68a" opacity="0.8"/>
            <circle cx="130" cy="127" r="3.5" fill="white" opacity="0.4"/>
            <circle cx="148" cy="121" r="2.5" fill="#fde68a" opacity="0.8"/>
            <circle cx="170" cy="128" r="3.5" fill="white" opacity="0.5"/>

            <!-- Tier 1 (top) -->
            <rect x="93" y="76" width="74" height="36" rx="5" fill="url(#tier1)"/>
            <ellipse cx="130" cy="76" rx="37" ry="6" fill="#e9d5ff"/>
            <ellipse cx="130" cy="112" rx="37" ry="5.5" fill="#7e22ce" opacity="0.5"/>

            <!-- Frosting drips tier 3 -->
            <path d="M60 145 Q65 135 70 145 Q75 135 80 145 Q85 135 90 145 Q95 135 100 145 Q105 135 110 145 Q115 135 120 145 Q125 135 130 145 Q135 135 140 145 Q145 135 150 145 Q155 135 160 145 Q165 135 170 145 Q175 135 180 145 Q185 135 190 145 Q195 135 200 145" fill="none" stroke="white" stroke-width="2.5" opacity="0.35"/>
            <path d="M70 108 Q76 98 83 108 Q90 98 97 108 Q104 98 111 108 Q118 98 125 108 Q132 98 139 108 Q146 98 153 108 Q160 98 167 108 Q174 98 181 108 Q188 98 190 108" fill="none" stroke="white" stroke-width="2.5" opacity="0.35"/>

            <!-- Candles (5) -->
            <!-- Candle 1 -->
            <rect x="95" y="58" width="8" height="20" rx="2" fill="#ff6b9d"/>
            <rect x="95" y="58" width="8" height="6" rx="1" fill="#ff8fab" opacity="0.7"/>
            <!-- Candle 2 -->
            <rect x="111" y="54" width="8" height="24" rx="2" fill="#ffd32a"/>
            <rect x="111" y="54" width="8" height="6" rx="1" fill="#ffe566" opacity="0.7"/>
            <!-- Candle 3 (center) -->
            <rect x="126" y="50" width="8" height="28" rx="2" fill="#c084f5"/>
            <rect x="126" y="50" width="8" height="7" rx="1" fill="#e0a0ff" opacity="0.7"/>
            <!-- Candle 4 -->
            <rect x="142" y="54" width="8" height="24" rx="2" fill="#ff9f43"/>
            <rect x="142" y="54" width="8" height="6" rx="1" fill="#ffbe76" opacity="0.7"/>
            <!-- Candle 5 -->
            <rect x="157" y="58" width="8" height="20" rx="2" fill="#0abde3"/>
            <rect x="157" y="58" width="8" height="6" rx="1" fill="#48dbfb" opacity="0.7"/>

            <!-- Wicks -->
            <line x1="99" y1="58" x2="99" y2="54" stroke="#4a4a4a" stroke-width="1.5"/>
            <line x1="115" y1="54" x2="115" y2="50" stroke="#4a4a4a" stroke-width="1.5"/>
            <line x1="130" y1="50" x2="130" y2="45" stroke="#4a4a4a" stroke-width="1.5"/>
            <line x1="146" y1="54" x2="146" y2="50" stroke="#4a4a4a" stroke-width="1.5"/>
            <line x1="161" y1="58" x2="161" y2="54" stroke="#4a4a4a" stroke-width="1.5"/>

            <!-- FLAMES -->
            <g id="flames">
              <!-- Flame 1 -->
              <g class="flame" style="transform-origin:99px 54px">
                <ellipse cx="99" cy="49" rx="5" ry="8" fill="#ff9f43" opacity="0.9"/>
                <ellipse cx="99" cy="50" rx="3" ry="5.5" fill="#ffd32a"/>
                <ellipse cx="99" cy="51" rx="1.5" ry="3" fill="#fff9c4"/>
              </g>
              <!-- Flame 2 -->
              <g class="flame" style="transform-origin:115px 50px">
                <ellipse cx="115" cy="45" rx="5.5" ry="9" fill="#ff9f43" opacity="0.9"/>
                <ellipse cx="115" cy="46" rx="3.5" ry="6" fill="#ffd32a"/>
                <ellipse cx="115" cy="47" rx="1.8" ry="3.5" fill="#fff9c4"/>
              </g>
              <!-- Flame 3 (tallest - center) -->
              <g class="flame" style="transform-origin:130px 45px">
                <ellipse cx="130" cy="38" rx="6.5" ry="11" fill="#ff9f43" opacity="0.9"/>
                <ellipse cx="130" cy="39" rx="4" ry="7.5" fill="#ffd32a"/>
                <ellipse cx="130" cy="41" rx="2" ry="4" fill="#fff9c4"/>
              </g>
              <!-- Flame 4 -->
              <g class="flame" style="transform-origin:146px 50px">
                <ellipse cx="146" cy="45" rx="5.5" ry="9" fill="#ff9f43" opacity="0.9"/>
                <ellipse cx="146" cy="46" rx="3.5" ry="6" fill="#ffd32a"/>
                <ellipse cx="146" cy="47" rx="1.8" ry="3.5" fill="#fff9c4"/>
              </g>
              <!-- Flame 5 -->
              <g class="flame" style="transform-origin:161px 54px">
                <ellipse cx="161" cy="49" rx="5" ry="8" fill="#ff9f43" opacity="0.9"/>
                <ellipse cx="161" cy="50" rx="3" ry="5.5" fill="#ffd32a"/>
                <ellipse cx="161" cy="51" rx="1.5" ry="3" fill="#fff9c4"/>
              </g>
            </g>

            <!-- Cherry on top -->
            <circle cx="130" cy="74" r="5" fill="#e8698a"/>
            <line x1="130" y1="69" x2="126" y2="64" stroke="#5e3a1a" stroke-width="1.5"/>
            <ellipse cx="123" cy="63" rx="4" ry="2.5" fill="#2d9e4f" transform="rotate(-30 123 63)"/>
          </svg>

          <!-- Spark elements -->
          <div class="spark" style="left:93px;top:40px;--sx:-12px;--sy:-35px;--sd:1.1s;background:#ffd32a;"></div>
          <div class="spark" style="left:107px;top:34px;--sx:8px;--sy:-42px;--sd:1.4s;background:#ff9f43;animation-delay:0.3s"></div>
          <div class="spark" style="left:122px;top:28px;--sx:-6px;--sy:-38px;--sd:1.2s;background:#f5d0fe;animation-delay:0.1s"></div>
          <div class="spark" style="left:136px;top:28px;--sx:10px;--sy:-40px;--sd:1s;background:#ffd32a;animation-delay:0.5s"></div>
          <div class="spark" style="left:152px;top:34px;--sx:-8px;--sy:-36px;--sd:1.3s;background:#ff9f43;animation-delay:0.2s"></div>
          <div class="spark" style="left:163px;top:38px;--sx:12px;--sy:-34px;--sd:1.1s;background:#c084f5;animation-delay:0.4s"></div>
        </div>
      </div>

      <!-- Divider -->
      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-icon">✦</div>
        <div class="divider-line"></div>
      </div>

      <!-- Message -->
      <div class="message">
        <p>May your day be as <span class="highlight">radiant</span> as you are,<br>
        filled with laughter, love & magic.<br>
        Wishing you <span class="highlight">all the joy</span> in the world<br>
        on your special day. 🌸</p>
      </div>

      <!-- Footer -->
      <div class="footer">
        <button class="blow-btn" id="blowBtn" onclick="blowCandles()">🎤 Make a Wish & Blow!</button>
        <div class="hearts" style="margin-top:16px;">♥ ♥ ♥</div>
      </div>

    </div>
    <div class="top-band"></div>
  </div>
</div>

<script>
// Stars
(function() {
  const s = document.getElementById('stars');
  for (let i = 0; i < 80; i++) {
    const el = document.createElement('div');
    el.className = 'star';
    el.style.cssText = `left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s;width:${Math.random()<0.3?3:2}px;height:${Math.random()<0.3?3:2}px;`;
    s.appendChild(el);
  }
})();

// Petals
(function() {
  const colors = ['#e8698a','#c084f5','#fde68a','#f9a8d4','#a5b4fc'];
  const c = document.getElementById('petals');
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'petal';
    el.style.cssText = `
      left:${Math.random()*100}%;
      top:${-20+Math.random()*-30}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${6+Math.random()*8}s;
      animation-delay:${Math.random()*8}s;
      width:${8+Math.random()*8}px;
      height:${10+Math.random()*10}px;
      transform:rotate(${Math.random()*360}deg);
    `;
    c.appendChild(el);
  }
})();

// 3D tilt
const card = document.getElementById('card');
card.addEventListener('mousemove', e => {
  const r = card.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width - 0.5;
  const y = (e.clientY - r.top) / r.height - 0.5;
  card.style.transform = `rotateY(${x*12}deg) rotateX(${-y*8}deg) scale(1.01)`;
});
card.addEventListener('mouseleave', () => {
  card.style.transform = '';
});

// Blow candles
let blown = false;
function blowCandles() {
  if (blown) { relightCandles(); return; }
  blown = true;
  const btn = document.getElementById('blowBtn');
  btn.textContent = '🕯️ Relight Candles';
  btn.classList.add('blown');

  const flames = document.getElementById('flames');
  const glow = document.getElementById('glowCircle');

  // Extinguish with puff animation
  flames.style.transition = 'opacity 0.6s ease';
  flames.style.opacity = '0';
  glow.style.opacity = '0';
  glow.style.transition = 'opacity 0.6s';

  // Confetti burst!
  launchConfetti();
}

function relightCandles() {
  blown = false;
  const btn = document.getElementById('blowBtn');
  btn.textContent = '🎤 Make a Wish & Blow!';
  btn.classList.remove('blown');
  const flames = document.getElementById('flames');
  const glow = document.getElementById('glowCircle');
  flames.style.opacity = '1';
  glow.style.opacity = '';
}

function launchConfetti() {
  const colors = ['#f0c040','#e8698a','#c084f5','#5DCAA5','#ff9f43','#fde68a','#a5b4fc','#f9a8d4'];
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 2;
  for (let i = 0; i < 100; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const angle = Math.random() * 360;
    const dist = 80 + Math.random() * 200;
    const dx = Math.cos(angle * Math.PI/180) * dist;
    el.style.cssText = `
      left:${cx}px;
      top:${cy}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      border-radius:${Math.random()>0.5?'50%':'2px'};
      width:${5+Math.random()*8}px;
      height:${5+Math.random()*8}px;
      animation-delay:${Math.random()*0.5}s;
      animation-duration:${2+Math.random()*1.5}s;
      transform:translate(${dx}px, ${-100-Math.random()*200}px) rotateZ(${Math.random()*720}deg);
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}
